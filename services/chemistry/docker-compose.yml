services:
  chemistry:
    build: .
    restart: unless-stopped
    environment:
      CHEMISTRY_SERVICE_TOKEN: ${CHEMISTRY_SERVICE_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-5-20250929}
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - chemistry
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
